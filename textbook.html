<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海事代理士試験 インタラクティブテキスト</title>
<style>
/* ===== CSS Variables & Reset ===== */
:root {
  --navy: #1a365d;
  --navy-light: #2a4a7f;
  --navy-dark: #0f2340;
  --cream: #fdf6e3;
  --cream-dark: #f5eedb;
  --accent: #e67e22;
  --accent-light: #f39c12;
  --success: #27ae60;
  --danger: #c0392b;
  --info: #2980b9;
  --permit-red: #e74c3c;
  --approval-orange: #e67e22;
  --registration-yellow: #f1c40f;
  --notification-blue: #3498db;
  --authorization-green: #2ecc71;
  --report-purple: #9b59b6;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --bg: var(--cream);
  --card-bg: #ffffff;
  --sidebar-bg: var(--navy);
  --sidebar-text: #ecf0f1;
  --border: #ddd;
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
  --radius: 8px;
  --font-body: 'Georgia', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  --font-heading: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  --font-mono: 'Consolas', 'Monaco', monospace;
  --transition: 0.3s ease;
}

[data-theme="dark"] {
  --navy: #1a365d;
  --cream: #1a1a2e;
  --cream-dark: #16213e;
  --text: #ecf0f1;
  --text-light: #bdc3c7;
  --bg: #0f0f23;
  --card-bg: #1a1a2e;
  --border: #2c3e50;
  --shadow: 0 2px 8px rgba(0,0,0,0.4);
  --sidebar-bg: #0a0a1a;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:18px; scroll-behavior:smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height:1.8;
  min-height:100vh;
  display:flex;
  transition: background var(--transition), color var(--transition);
}

::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background: var(--cream-dark); }
::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius:4px; }

/* ===== Sidebar ===== */
#sidebar {
  width:300px; min-width:300px;
  background: var(--sidebar-bg); color: var(--sidebar-text);
  height:100vh; position:fixed; top:0; left:0;
  overflow-y:auto; z-index:1000;
  transition: transform var(--transition), width var(--transition);
  display:flex; flex-direction:column;
}
#sidebar.collapsed { transform:translateX(-300px); }

.sidebar-header { padding:20px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
.sidebar-header h2 { font-family: var(--font-heading); font-size:1.1rem; margin-bottom:4px; }
.sidebar-header .subtitle { font-size:0.7rem; opacity:0.7; }

.sidebar-progress { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
.progress-bar-container { background: rgba(255,255,255,0.1); border-radius:10px; height:8px; overflow:hidden; margin-top:6px; }
.progress-bar-fill { height:100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius:10px; transition: width 0.5s ease; }
.sidebar-stats { display:flex; justify-content:space-between; font-size:0.65rem; margin-top:6px; opacity:0.8; }

.sidebar-nav { flex:1; overflow-y:auto; padding:10px 0; }
.phase-group { margin-bottom:6px; }

.phase-header {
  padding:10px 20px; font-family: var(--font-heading); font-size:0.75rem;
  font-weight:bold; color: var(--accent-light); cursor:pointer;
  display:flex; align-items:center; gap:8px; user-select:none;
}
.phase-header:hover { background:rgba(255,255,255,0.05); }
.phase-header .arrow { transition: transform var(--transition); font-size:0.6rem; }
.phase-header.expanded .arrow { transform:rotate(90deg); }
.phase-lessons { display:none; }
.phase-header.expanded + .phase-lessons { display:block; }

.lesson-item {
  padding:8px 20px 8px 36px; font-size:0.7rem; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  transition: background var(--transition); border-left:3px solid transparent;
}
.lesson-item:hover { background:rgba(255,255,255,0.08); }
.lesson-item.active { background:rgba(255,255,255,0.12); border-left-color:var(--accent); }
.lesson-item.completed .status-icon { color:var(--success); }
.lesson-item.locked { opacity:0.5; }
.status-icon { font-size:0.8rem; flex-shrink:0; width:20px; text-align:center; }

/* Importance badges in sidebar */
.importance-badge-sm {
  font-size:0.55rem; margin-left:auto; padding:1px 5px;
  border-radius:6px; font-weight:bold; flex-shrink:0;
}
.importance-badge-sm.critical { background:#e74c3c; color:white; }
.importance-badge-sm.important { background:#f39c12; color:white; }
.importance-badge-sm.basic { background:#3498db; color:white; }

.sidebar-search { padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
.sidebar-search input {
  width:100%; padding:6px 10px; border:1px solid rgba(255,255,255,0.2);
  border-radius:4px; background:rgba(255,255,255,0.08); color:var(--sidebar-text);
  font-size:0.7rem; outline:none;
}
.sidebar-search input::placeholder { color:rgba(255,255,255,0.4); }
.sidebar-search input:focus { border-color:var(--accent); }
.search-results { max-height:200px; overflow-y:auto; margin-top:6px; }
.search-result-item { padding:4px 8px; font-size:0.65rem; cursor:pointer; border-radius:3px; }
.search-result-item:hover { background:rgba(255,255,255,0.1); }

/* ===== Top Bar ===== */
#topbar {
  position:fixed; top:0; left:300px; right:0; height:50px;
  background: var(--card-bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; z-index:900;
  transition: left var(--transition), background var(--transition); gap:16px;
}
#sidebar.collapsed ~ #main #topbar, .sidebar-collapsed #topbar { left:0; }

.menu-toggle { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text); padding:4px; }
.topbar-info { flex:1; display:flex; align-items:center; gap:16px; font-size:0.7rem; font-family:var(--font-heading); }
.streak-badge { background:var(--accent); color:white; padding:2px 10px; border-radius:12px; font-size:0.65rem; font-weight:bold; }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.topbar-actions button { background:none; border:none; font-size:1rem; cursor:pointer; color:var(--text); padding:4px 8px; border-radius:4px; transition: background var(--transition); }
.topbar-actions button:hover { background:rgba(0,0,0,0.05); }

/* ===== Main Content ===== */
#main { flex:1; margin-left:300px; transition: margin-left var(--transition); }
#sidebar.collapsed ~ #main { margin-left:0; }
#content { max-width:800px; margin:70px auto 40px; padding:0 24px 60px; }

/* ===== Welcome Screen ===== */
.welcome-screen { text-align:center; padding:60px 20px; }
.welcome-screen h1 { font-family:var(--font-heading); font-size:2rem; color:var(--navy); margin-bottom:10px; }
[data-theme="dark"] .welcome-screen h1 { color:var(--accent-light); }
.welcome-screen .lead { font-size:1rem; color:var(--text-light); margin-bottom:40px; }
.welcome-cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin:30px 0; }
.welcome-card { background:var(--card-bg); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); text-align:center; cursor:pointer; transition: transform var(--transition), box-shadow var(--transition); border:2px solid transparent; }
.welcome-card:hover { transform:translateY(-4px); box-shadow:0 6px 20px rgba(0,0,0,0.15); }
.welcome-card.recommended { border-color:var(--accent); }
.welcome-card .emoji { font-size:2rem; margin-bottom:10px; }
.welcome-card h3 { font-family:var(--font-heading); font-size:0.9rem; margin-bottom:6px; }
.welcome-card p { font-size:0.7rem; color:var(--text-light); }
.start-btn { display:inline-block; margin-top:30px; padding:14px 40px; background: linear-gradient(135deg, var(--navy), var(--navy-light)); color:white; border:none; border-radius:var(--radius); font-size:0.9rem; font-family:var(--font-heading); cursor:pointer; transition: transform var(--transition), box-shadow var(--transition); }
.start-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(26,54,93,0.4); }

/* ===== Badge Legend ===== */
.badge-legend {
  background: var(--card-bg); border-radius: var(--radius); padding:16px 20px;
  margin:20px 0 30px; box-shadow: var(--shadow); border:1px solid var(--border);
}
.badge-legend h3 { font-family:var(--font-heading); font-size:0.9rem; margin-bottom:10px; }
.badge-legend-items { display:flex; flex-wrap:wrap; gap:16px; font-size:0.8rem; }
.badge-legend-item { display:flex; align-items:center; gap:6px; }

/* ===== Importance Badge (header) ===== */
.importance-badge {
  display:inline-block; padding:3px 12px; border-radius:12px;
  font-size:0.7rem; font-weight:bold; font-family:var(--font-heading);
  color:white; margin-left:10px; vertical-align:middle;
}
.importance-badge.critical { background:#e74c3c; }
.importance-badge.important { background:#f39c12; }
.importance-badge.basic { background:#3498db; }

/* ===== Lesson Content ===== */
.lesson-container { animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.lesson-progress-bar { position:sticky; top:50px; background: var(--bg); padding:8px 0; z-index:50; }
.lesson-progress-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.lesson-progress-fill { height:100%; background:linear-gradient(90deg, var(--info), var(--success)); width:0%; transition:width 0.3s ease; }

.lesson-header { margin:20px 0 30px; padding-bottom:20px; border-bottom:2px solid var(--border); }
.lesson-phase-tag { display:inline-block; background:var(--navy); color:white; padding:2px 12px; border-radius:12px; font-size:0.65rem; font-family:var(--font-heading); margin-bottom:10px; }
.lesson-header h1 { font-family:var(--font-heading); font-size:1.6rem; color:var(--navy); margin-bottom:8px; }
[data-theme="dark"] .lesson-header h1 { color:var(--accent-light); }

.learning-objectives { background:linear-gradient(135deg, rgba(26,54,93,0.05), rgba(26,54,93,0.02)); border-left:4px solid var(--navy); padding:16px 20px; border-radius:0 var(--radius) var(--radius) 0; margin-top:16px; }
.learning-objectives h3 { font-family:var(--font-heading); font-size:0.8rem; margin-bottom:8px; color:var(--navy); }
[data-theme="dark"] .learning-objectives h3 { color:var(--accent-light); }
.learning-objectives ul { list-style:none; }
.learning-objectives li { padding:3px 0; font-size:0.8rem; }
.learning-objectives li::before { content:"\2713 "; color:var(--success); font-weight:bold; margin-right:6px; }

/* ===== Section Styles ===== */
.lesson-section { margin:30px 0; padding-top:10px; }
.lesson-section h2 { font-family:var(--font-heading); font-size:1.2rem; color:var(--navy); margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
[data-theme="dark"] .lesson-section h2 { color:var(--accent-light); }
.lesson-section h3 { font-family:var(--font-heading); font-size:1rem; color:var(--navy-light); margin:20px 0 10px; }
[data-theme="dark"] .lesson-section h3 { color:#ddd; }
.lesson-section p { margin-bottom:14px; font-size:0.9rem; }

/* ===== Intro Box ===== */
.intro-box { background:linear-gradient(135deg, var(--card-bg), var(--cream-dark)); border-radius:var(--radius); padding:24px; margin:20px 0; box-shadow:var(--shadow); border-left:5px solid var(--accent); }
.intro-box .scenario { font-style:italic; color:var(--text-light); margin-bottom:12px; font-size:0.85rem; }

/* ===== Key Term Highlight ===== */
.key-term { background:linear-gradient(180deg, transparent 60%, rgba(241,196,15,0.3) 60%); cursor:pointer; font-weight:bold; position:relative; transition: background var(--transition); }
.key-term:hover { background:rgba(241,196,15,0.4); }

/* ===== Term Card Popup ===== */
.term-popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--card-bg); border-radius:12px; padding:28px; box-shadow:0 10px 40px rgba(0,0,0,0.25); z-index:2000; max-width:450px; width:90%; animation:popIn 0.25s ease; }
@keyframes popIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.9)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
.term-popup.show { display:block; }
.term-popup-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.4); z-index:1999; }
.term-popup-overlay.show { display:block; }
.term-popup h3 { font-family:var(--font-heading); font-size:1.1rem; margin-bottom:4px; color:var(--navy); }
[data-theme="dark"] .term-popup h3 { color:var(--accent-light); }
.term-popup .reading { font-size:0.75rem; color:var(--text-light); margin-bottom:12px; }
.term-popup .term-section { margin:10px 0; padding:10px; background:var(--cream); border-radius:6px; }
[data-theme="dark"] .term-popup .term-section { background:var(--cream-dark); }
.term-popup .term-section-label { font-family:var(--font-heading); font-size:0.7rem; font-weight:bold; color:var(--navy); margin-bottom:4px; }
[data-theme="dark"] .term-popup .term-section-label { color:var(--accent-light); }
.term-popup .close-btn { position:absolute; top:12px;right:16px; background:none;border:none; font-size:1.2rem;cursor:pointer; color:var(--text-light); }
.term-popup .bookmark-btn { margin-top:12px; padding:6px 16px; border:1px solid var(--accent); background:transparent; color:var(--accent); border-radius:4px; cursor:pointer; font-size:0.7rem; transition:all var(--transition); }
.term-popup .bookmark-btn:hover, .term-popup .bookmark-btn.bookmarked { background:var(--accent); color:white; }

/* ===== Info Box / Callout ===== */
.info-box { border-radius:var(--radius); padding:16px 20px; margin:16px 0; font-size:0.85rem; }
.info-box.tip { background:rgba(39,174,96,0.08); border-left:4px solid var(--success); }
.info-box.warning { background:rgba(231,76,60,0.08); border-left:4px solid var(--danger); }
.info-box.note { background:rgba(41,128,185,0.08); border-left:4px solid var(--info); }
.info-box.mnemonic { background:rgba(155,89,182,0.08); border-left:4px solid var(--report-purple); }
.info-box .box-title { font-family:var(--font-heading); font-weight:bold; font-size:0.8rem; margin-bottom:6px; }

/* ===== Exam Trap Box ===== */
.info-box.trap { background:rgba(230,126,34,0.08); border-left:4px solid #e67e22; border:2px solid #e67e22; border-radius:var(--radius); }
.info-box.trap .box-title { color:#d35400; }
.info-box.trap .box-title::before { content:"\26A0\FE0F "; }

/* ===== Tables ===== */
.styled-table { width:100%; border-collapse:collapse; margin:16px 0; font-size:0.8rem; box-shadow:var(--shadow); border-radius:var(--radius); overflow:hidden; }
.styled-table thead th { background:var(--navy); color:white; padding:10px 14px; text-align:left; font-family:var(--font-heading); font-size:0.75rem; }
.styled-table tbody td { padding:10px 14px; border-bottom:1px solid var(--border); background:var(--card-bg); }
.styled-table tbody tr:hover td { background:var(--cream-dark); }

/* ===== Color-coded Badges ===== */
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:0.7rem; font-weight:bold; font-family:var(--font-heading); color:white; }
.badge.permit { background:var(--permit-red); }
.badge.approval { background:var(--approval-orange); }
.badge.registration { background:var(--registration-yellow); color:#333; }
.badge.notification { background:var(--notification-blue); }
.badge.authorization { background:var(--authorization-green); }
.badge.report { background:var(--report-purple); }
.badge.confirmation { background:#1abc9c; }

/* ===== Flowchart ===== */
.flowchart { display:flex; flex-direction:column; align-items:center; gap:0; margin:20px 0; padding:20px; background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); }
.flow-step { padding:12px 24px; border-radius:var(--radius); font-size:0.8rem; font-family:var(--font-heading); text-align:center; max-width:90%; position:relative; border:2px solid; }
.flow-step.blue { background:rgba(41,128,185,0.1); border-color:var(--info); color:var(--info); }
.flow-step.red { background:rgba(231,76,60,0.1); border-color:var(--danger); color:var(--danger); }
.flow-step.green { background:rgba(39,174,96,0.1); border-color:var(--success); color:var(--success); }
.flow-step.orange { background:rgba(230,126,34,0.1); border-color:var(--accent); color:var(--accent); }
.flow-arrow { font-size:1.2rem; color:var(--text-light); line-height:1; padding:4px 0; }

/* ===== Ship Diagram ===== */
.ship-diagram { margin:20px 0; padding:30px; background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); text-align:center; }
.ship-svg { max-width:100%; height:auto; }

/* ===== Summary Box ===== */
.summary-box { background:linear-gradient(135deg, rgba(26,54,93,0.08), rgba(26,54,93,0.03)); border:2px solid var(--navy); border-radius:var(--radius); padding:24px; margin:30px 0; }
.summary-box h3 { font-family:var(--font-heading); color:var(--navy); font-size:1rem; margin-bottom:12px; }
[data-theme="dark"] .summary-box { border-color:var(--accent); }
[data-theme="dark"] .summary-box h3 { color:var(--accent-light); }
.summary-box ul { list-style:none; }
.summary-box li { padding:6px 0; font-size:0.85rem; border-bottom:1px solid rgba(0,0,0,0.05); }
.summary-box li::before { content:"\25C6 "; color:var(--accent); }

/* ===== Quiz Section ===== */
.quiz-section { background:var(--card-bg); border-radius:var(--radius); padding:28px; margin:30px 0; box-shadow:var(--shadow); border:2px solid var(--info); }
.quiz-section h3 { font-family:var(--font-heading); font-size:1rem; color:var(--info); margin-bottom:6px; }
.quiz-subtitle { font-size:0.75rem; color:var(--text-light); margin-bottom:20px; }
.quiz-question { margin:20px 0; padding:16px; background:var(--cream); border-radius:var(--radius); }
[data-theme="dark"] .quiz-question { background:var(--cream-dark); }
.quiz-question p { font-weight:bold; font-size:0.85rem; margin-bottom:12px; font-family:var(--font-heading); }
.quiz-options { display:flex; flex-direction:column; gap:8px; }
.quiz-option { padding:10px 16px; border:2px solid var(--border); border-radius:var(--radius); cursor:pointer; font-size:0.8rem; transition:all var(--transition); background:var(--card-bg); }
.quiz-option:hover:not(.selected) { border-color:var(--info); background:rgba(41,128,185,0.05); }
.quiz-option.selected { border-color:var(--info); background:rgba(41,128,185,0.1); }
.quiz-option.correct { border-color:var(--success); background:rgba(39,174,96,0.1); }
.quiz-option.incorrect { border-color:var(--danger); background:rgba(231,76,60,0.1); }
.quiz-explanation { display:none; margin-top:12px; padding:12px; background:rgba(39,174,96,0.05); border-radius:6px; font-size:0.8rem; border-left:3px solid var(--success); }
.quiz-explanation.show { display:block; }
.quiz-result { display:none; text-align:center; padding:20px; margin-top:20px; border-radius:var(--radius); font-family:var(--font-heading); }
.quiz-result.show { display:block; }
.quiz-result.pass { background:rgba(39,174,96,0.1); border:2px solid var(--success); }
.quiz-result.fail { background:rgba(231,76,60,0.1); border:2px solid var(--danger); }
.quiz-submit-btn { display:inline-block; margin-top:16px; padding:10px 30px; background:var(--info); color:white; border:none; border-radius:var(--radius); font-size:0.85rem; font-family:var(--font-heading); cursor:pointer; transition:all var(--transition); }
.quiz-submit-btn:hover { background:var(--navy-light); transform:translateY(-1px); }
.quiz-submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* ===== Lesson Navigation ===== */
.lesson-nav { display:flex; justify-content:space-between; margin-top:40px; padding-top:20px; border-top:2px solid var(--border); gap:12px; }
.lesson-nav-btn { padding:12px 24px; background:var(--card-bg); border:2px solid var(--navy); border-radius:var(--radius); cursor:pointer; font-family:var(--font-heading); font-size:0.8rem; color:var(--navy); transition:all var(--transition); flex:1; max-width:48%; }
.lesson-nav-btn:hover { background:var(--navy); color:white; }
.lesson-nav-btn.next { text-align:right; }
.lesson-nav-btn.prev { text-align:left; }
.lesson-nav-btn .label { font-size:0.65rem; color:var(--text-light); display:block; }
.lesson-nav-btn:hover .label { color:rgba(255,255,255,0.8); }

/* ===== Expandable Card ===== */
.expand-card { border:1px solid var(--border); border-radius:var(--radius); margin:10px 0; overflow:hidden; }
.expand-card-header { padding:12px 16px; background:var(--card-bg); cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-family:var(--font-heading); font-size:0.85rem; font-weight:bold; transition:background var(--transition); }
.expand-card-header:hover { background:var(--cream-dark); }
.expand-card-header .icon { transition:transform var(--transition); }
.expand-card.open .expand-card-header .icon { transform:rotate(180deg); }
.expand-card-body { display:none; padding:16px; border-top:1px solid var(--border); font-size:0.85rem; background:var(--card-bg); }
.expand-card.open .expand-card-body { display:block; }

/* ===== Zone Diagram ===== */
.zone-diagram { margin:20px 0; padding:20px; background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); overflow-x:auto; }

/* ===== Bookmarks Panel ===== */
#bookmarks-panel { display:none; position:fixed; top:50px;right:0; width:320px; height:calc(100vh - 50px); background:var(--card-bg); border-left:1px solid var(--border); z-index:800; overflow-y:auto; padding:20px; box-shadow:-4px 0 10px rgba(0,0,0,0.1); }
#bookmarks-panel.show { display:block; }
#bookmarks-panel h3 { font-family:var(--font-heading); font-size:1rem; margin-bottom:16px; }
.bookmark-item { padding:10px; border:1px solid var(--border); border-radius:6px; margin-bottom:8px; cursor:pointer; font-size:0.75rem; transition:background var(--transition); }
.bookmark-item:hover { background:var(--cream-dark); }
.bookmark-item .term { font-weight:bold; }
.bookmark-item .reading { color:var(--text-light); font-size:0.65rem; }

/* ===== Route Map ===== */
.route-map { margin:20px 0; padding:24px; background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); }
.route-list { display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size:0.8rem; }
.route-item { padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--cream); }
[data-theme="dark"] .route-item { background:var(--cream-dark); }
.route-item .num { font-family:var(--font-heading); font-weight:bold; color:var(--info); margin-right:6px; }

/* ===== Two-column ===== */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:16px 0; }
@media(max-width:600px) { .two-col { grid-template-columns:1fr; } }
.col-card { background:var(--card-bg); border-radius:var(--radius); padding:16px; border:1px solid var(--border); }
.col-card h4 { font-family:var(--font-heading); font-size:0.85rem; margin-bottom:8px; color:var(--navy); }
[data-theme="dark"] .col-card h4 { color:var(--accent-light); }
.col-card ul { padding-left:18px; font-size:0.8rem; }
.col-card li { margin-bottom:4px; }

/* ===== Definition list ===== */
.def-list { margin:12px 0; }
.def-item { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05); font-size:0.85rem; }
.def-label { font-weight:bold; font-family:var(--font-heading); min-width:100px; flex-shrink:0; color:var(--navy); }
[data-theme="dark"] .def-label { color:var(--accent-light); }

ruby { ruby-align:center; }
rt { font-size:0.55em; color:var(--text-light); }

.section-num { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; background:var(--navy); color:white; border-radius:50%; font-size:0.75rem; font-family:var(--font-heading); font-weight:bold; }

/* ===== Cross-reference link ===== */
.cross-ref { color:var(--info); cursor:pointer; text-decoration:underline; font-size:0.8rem; }
.cross-ref:hover { color:var(--navy-light); }

/* ===== Responsive ===== */
@media (max-width:768px) {
  html { font-size:16px; }
  #sidebar { transform:translateX(-300px); }
  #sidebar.open { transform:translateX(0); }
  #main { margin-left:0 !important; }
  #topbar { left:0 !important; }
  .route-list { grid-template-columns:1fr; }
  .welcome-cards { grid-template-columns:1fr; }
  .lesson-nav { flex-direction:column; }
  .lesson-nav-btn { max-width:100%; }
}

@media print {
  #sidebar, #topbar, .quiz-section, .lesson-nav { display:none !important; }
  #main { margin-left:0 !important; }
  body { background:white; }
  .lesson-container { max-width:100%; }
}

.fade-in { animation: fadeIn 0.4s ease; }

<script>

  18:{level:'basic', emoji:'\ud83d\udcd5', label:'基礎'},
  19:{level:'basic', emoji:'\ud83d\udcd5', label:'基礎'},
  20:{level:'basic', emoji:'\ud83d\udcd5', label:'基礎'},

const PHASES = [
  { id:'phase1', title:'Phase 1: 法律の基礎固め', lessons:[1,2,3,4,5,6] },
  { id:'phase2', title:'Phase 2: 海事法規コア', lessons:[7,8,9,10,11,12] },
  { id:'phase3', title:'Phase 3: 交通・港湾・環境法', lessons:[13,14,15,16,17,18] },
  { id:'phase4', title:'Phase 4: 残りの科目', lessons:[19,20] },
];

// Key terms database (expanded)
const TERMS = {
  "三権分立":{reading:"さんけんぶんりつ",definition:"国家権力を立法権（国会）・行政権（内閣）・司法権（裁判所）の3つに分け、相互に監視・抑制させることで権力の濫用を防ぐ仕組み。",example:"国会が法律を作り、内閣がそれを実施し、裁判所が法律に違反していないか審査する。",article:"憲法41条（立法権）、65条（行政権）、76条（司法権）"},
  "基本的人権":{reading:"きほんてきじんけん",definition:"人が生まれながらに持つ権利。自由権・社会権・平等権・参政権などが含まれる。",example:"船員も労働基本権（憲法28条）に基づき団結権を有する。",article:"憲法11条、97条"},
  "違憲審査権":{reading:"いけんしんさけん",definition:"裁判所が法律や行政行為が憲法に違反していないかを審査する権限。最高裁判所が終審裁判所。",example:"ある海事関連法が基本的人権を侵害していると訴えられた場合、裁判所が審査する。",article:"憲法81条"},
  "財産権":{reading:"ざいさんけん",definition:"財産を所有し自由に使用・処分する権利。公共の福祉による制約を受ける。船舶所有の根拠となる重要な権利。",example:"船主が所有する船舶は財産権により保護される。ただし航行安全のための規制は公共の福祉として許容される。",article:"憲法29条"},
  "職業選択の自由":{reading:"しょくぎょうせんたくのじゆう",definition:"何人も公共の福祉に反しない限り、職業を自由に選択できる権利。海事代理士の資格制度はこの自由の合理的制約。",example:"海事代理士になるには国家試験合格が必要だが、これは職業選択の自由の合理的制約として合憲。",article:"憲法22条1項"},
  "物権":{reading:"ぶっけん",definition:"物に対する直接的・排他的な支配権。所有権、抵当権、質権などが含まれる。",example:"船舶の所有権は物権の一種。船を自由に使用・処分できる。",article:"民法175条〜"},
  "債権":{reading:"さいけん",definition:"特定の人に対して特定の行為（給付）を請求できる権利。",example:"傭船契約で船主は傭船料を請求する債権を持ち、傭船者は船舶を使用する債権を持つ。",article:"民法399条〜"},
  "抵当権":{reading:"ていとうけん",definition:"債務者が債務を履行しない場合に、担保に入れた財産から優先的に弁済を受けられる権利。目的物の占有は移転しない。",example:"船舶を担保に銀行から融資を受ける場合、銀行が船舶抵当権を設定する。船は引き続き航行可能。",article:"民法369条、商法848条〜"},
  "船舶先取特権":{reading:"せんぱくさきどりとっけん",definition:"法律が定める特定の債権者が、船舶から他の債権者に優先して弁済を受けられる権利。登記不要で当然に成立する。抵当権にも優先する。",example:"船員の給料債権、救助料債権、船舶の衝突による損害賠償債権などは船舶先取特権により保護される。",article:"商法842条〜847条"},
  "対抗要件":{reading:"たいこうようけん",definition:"権利の取得を第三者に主張するために必要な要件。不動産は登記、動産は引渡し。",example:"船舶の所有権移転は登記が対抗要件。登記しないと第三者に所有権を主張できない。",article:"民法177条、178条"},
  "時効":{reading:"じこう",definition:"一定期間の経過により権利を取得（取得時効）したり、権利が消滅（消滅時効）したりする制度。",example:"傭船料の請求権は5年間行使しないと消滅時効にかかる。",article:"民法162条〜、166条〜"},
  "善意・悪意":{reading:"ぜんい・あくい",definition:"法律用語では道徳的な意味ではなく、「善意」＝ある事実を知らないこと、「悪意」＝ある事実を知っていること。",example:"船舶の購入者が、その船に抵当権が設定されていることを知らなかった＝善意の第三者。",article:"民法各所"},
  "不法行為":{reading:"ふほうこうい",definition:"故意または過失によって他人の権利を侵害し、損害を与えた場合に損害賠償義務が生じる制度。",example:"船舶の操船ミスにより他船に衝突し損害を与えた場合、不法行為に基づく損害賠償責任を負う。",article:"民法709条"},
  "共同海損":{reading:"きょうどうかいそん",definition:"船舶・積荷が共同の危険にさらされた際、その危険を回避するために故意かつ合理的に行った犠牲・費用を、利害関係者全員で分担する制度。",example:"嵐の中で船を軽くするため積荷の一部を海に投棄した場合、その損害を船主・荷主全員で分担する。",article:"商法788条〜"},
  "船舶衝突":{reading:"せんぱくしょうとつ",definition:"船舶同士が衝突して損害が生じた場合の損害賠償制度。過失割合に応じて賠償責任を負う。損害賠償請求権は2年で時効消滅。",example:"A船とB船が衝突し、A船に70%、B船に30%の過失があった場合、各々の過失割合に応じて賠償する。",article:"商法797条〜"},
  "海難救助":{reading:"かいなんきゅうじょ",definition:"海上で遭難した船舶や積荷を救助した者に報酬を支払う制度。不成功無報酬の原則（No Cure, No Pay）が基本。",example:"沈みかけたタンカーを別の船が救助した場合、救助者は救助料を請求できる。",article:"商法800条〜"},
  "船荷証券":{reading:"ふなにしょうけん",definition:"運送人が荷送人に対して発行する有価証券。貨物の受取と運送契約の証拠となり、貨物の引渡請求権を表す。B/L (Bill of Lading)。",example:"海上運送で貨物を積み込んだ際に船会社が発行。受取証・運送契約証拠・有価証券の3機能を持つ。",article:"商法767条〜"},
  "傭船契約":{reading:"ようせんけいやく",definition:"船舶の所有者が船舶を他者に貸し出す契約。定期傭船（タイムチャーター）と裸傭船（ベアボートチャーター）がある。",example:"旭タンカーがトミタ海運の船舶を定期傭船する場合、毎月傭船料を支払う。",article:"商法704条〜"},
  "定期傭船":{reading:"ていきようせん",definition:"船員付きで一定期間船舶を借りる契約。船主が船員を配乗し、運航指示は傭船者が行う。タイムチャーター（T/C）とも呼ぶ。",example:"トミタ海運が船員を乗せた状態で旭タンカーに船を貸し出す。旭タンカーは運航場所を指示する。",article:"商法704条"},
  "裸傭船":{reading:"はだかようせん",definition:"船体だけを借りて傭船者が自分で船員を手配する契約。ベアボートチャーター（B/B）とも呼ぶ。傭船者が船舶所有者と同様の責任を負う。",example:"B社がA社から船体のみを借り受け、B社が自ら船員を雇い入れて運航する。",article:"商法707条"},
  "船籍港":{reading:"せんせきこう",definition:"船舶法に基づき船舶の登録をする港。船舶の「本籍地」にあたる。船体に表示する義務がある。",example:"裕洋丸の船籍港は宿毛港。船尾に「宿毛」と表示される。",article:"船舶法4条"},
  "管海官庁":{reading:"かんかいかんちょう",definition:"船舶に関する行政事務を管轄する官庁。具体的には地方運輸局、運輸監理部、海事事務所等。",example:"船舶国籍証書の交付申請は、船籍港を管轄する管海官庁に行う。",article:"船舶法施行細則"},
  "船舶国籍証書":{reading:"せんぱくこくせきしょうしょ",definition:"日本船舶であることを証明する公文書。船舶の登録後に管海官庁から交付される。有効期間なし（永久）。",example:"裕洋丸には船舶国籍証書が交付されており、日本国旗を掲げる権利がある。",article:"船舶法5条"},
  "仮船舶国籍証書":{reading:"かりせんぱくこくせきしょうしょ",definition:"正式な船舶国籍証書の交付を受けるまでの間、暫定的に日本船舶としての資格を証明する書類。有効期間は1年。",example:"外国で建造された新造船を日本に回航する際、現地の日本領事館で仮船舶国籍証書の交付を受ける。",article:"船舶法10条"},
  "総トン数":{reading:"そうトンすう",definition:"船舶の大きさを表す指標。船舶の閉囲場所の容積に基づいて算出される（重さではなく容積）。",example:"総トン数500トン以上の船舶は国際航海時にISPS法の適用を受ける。",article:"トン数法4条"},
  "測度":{reading:"そくど",definition:"船舶の総トン数を計算・確定するための測定手続き。管海官庁に申請する。",example:"新造船の完成時に総トン数の測度を申請し、トン数が確定される。",article:"船舶法9条"},
  "雇入契約":{reading:"やといいれけいやく",definition:"船員と船舶所有者の間で締結される労働契約。締結・終了時に地方運輸局長への届出が必要。",example:"船員が新しい船に乗り組む際、船舶所有者と雇入契約を締結し、地方運輸局長に届け出る。",article:"船員法32条〜"},
  "船員手帳":{reading:"せんいんてちょう",definition:"船員の身分証明書。雇入契約の締結状況、資格等が記載される。地方運輸局長が交付する。",example:"船員が乗船する際は常に船員手帳を携帯する義務がある。",article:"船員法58条"},
  "定期検査":{reading:"ていきけんさ",definition:"船舶安全法に基づき5年ごとに行われる総合的な検査。合格すると船舶検査証書が交付される。",example:"裕洋丸は5年に1回定期検査を受け、船舶検査証書の更新を行う。",article:"船舶安全法5条"},
  "船舶検査証書":{reading:"せんぱくけんさしょうしょ",definition:"船舶が安全基準に適合していることを証明する公文書。有効期間は5年。",example:"検査証書がない船舶は航行できない。有効期間中に中間検査も必要。",article:"船舶安全法9条"},
  "満載喫水線":{reading:"まんさいきっすいせん",definition:"船舶が安全に航行できる最大積載量の限度を示す線。この線以上に沈むほど貨物を積んではならない。",example:"タンカーに油を積む際、満載喫水線を超えて積載すると違法。季節や海域により線の位置が異なる。",article:"船舶安全法2条"},
  "航行区域":{reading:"こうこうくいき",definition:"船舶が航行できる海域の区分。遠洋区域・近海区域・沿海区域・平水区域の4種類がある。船舶検査証書に記載される。",example:"沿海区域の船舶検査証書を持つ船は、遠洋区域を航行することができない。",article:"船舶安全法施行規則1条"},
  "海技免許":{reading:"かいぎめんきょ",definition:"船舶職員として乗り組むために必要な国家資格。航海・機関・通信・電子通信の4区分がある。",example:"大型タンカーの船長には1級海技士（航海）の免許が必要。",article:"船舶職員及び小型船舶操縦者法4条"},

      <tr><td><strong>委任契約</strong></td><td>事務の処理を委託</td><td>海事代理士への依頼</td></tr>
      <tr><td><strong>雇用契約</strong></td><td>労務の提供と報酬</td><td><span class="key-term" data-term="雇入契約">雇入契約</span>（船員法上の特別な雇用契約）</td></tr>
    </tbody>
  </table>
</div>

<div class="lesson-section">
  <h2><span class="section-num">2</span> <span class="key-term" data-term="物権">物権</span>と<span class="key-term" data-term="債権">債権</span></h2>
  <p>民法上の権利は大きく「物権」と「債権」に分かれます。これは民法の<strong>最重要概念</strong>です。</p>

  <div class="two-col">
    <div class="col-card" style="border-top:4px solid var(--info)">
      <h4>物権（物に対する権利）</h4>
      <ul>
        <li>物を<strong>直接的・排他的</strong>に支配する権利</li>
        <li>誰に対しても主張できる（<strong>絶対権</strong>）</li>
        <li>例：<strong>所有権</strong>、<strong>抵当権</strong>、<strong>質権</strong>、<strong>先取特権</strong></li>
        <li>船舶の所有権 → <strong>登記</strong>が<span class="key-term" data-term="対抗要件">対抗要件</span></li>
      </ul>
    </div>
    <div class="col-card" style="border-top:4px solid var(--accent)">
      <h4>債権（人に対する権利）</h4>
      <ul>
        <li>特定の人に対して行為を<strong>請求</strong>する権利</li>
        <li>債権者と債務者の関係（<strong>相対権</strong>）</li>
        <li>例：売買代金請求権、<strong>傭船料請求権</strong></li>
        <li>債務不履行 → <strong>損害賠償請求</strong></li>
      </ul>
    </div>
  </div>

  <h3>船舶先取特権と船舶抵当権</h3>
  <div class="info-box note">
    <div class="box-title">船舶における担保物権の優先順位</div>
    <p>船舶に関する担保物権には重要な<strong>優先順位</strong>があります：</p>
    <p><strong>1. <span class="key-term" data-term="船舶先取特権">船舶先取特権</span></strong> ＞ <strong>2. 船舶抵当権</strong></p>
    <p>船舶先取特権は<strong>登記なしに当然に成立</strong>し、<strong>抵当権に優先</strong>します。これは船員の給料債権や海難救助料などを特に保護するためです。</p>
  </div>

  <table class="styled-table">
    <thead><tr><th>担保物権</th><th>成立要件</th><th>具体例</th><th>優先順位</th></tr></thead>
    <tbody>
      <tr><td><strong>船舶先取特権</strong></td><td><strong>登記不要</strong>（法律上当然に成立）</td><td>船員の給料、救助料、衝突損害賠償、港湾使用料</td><td><strong>最優先</strong></td></tr>
      <tr><td><strong>船舶抵当権</strong></td><td><strong>登記必要</strong></td><td>銀行融資の担保として船舶に抵当権を設定</td><td>先取特権の次</td></tr>
    </tbody>
  </table>

  <div class="info-box note">
    <div class="box-title">船舶抵当権の特徴</div>
    <p>通常、動産（不動産以外の物）には抵当権を設定できませんが、<strong>船舶は例外</strong>です。船舶は高額なため、登記制度が整備されており、<span class="key-term" data-term="抵当権">抵当権</span>を設定できます。これにより、船舶を担保に融資を受けることが可能です（船舶を手元に置いたまま航行し続けられます）。<strong>対抗要件は登記</strong>（<strong>民法第177条</strong>の類推適用）です。</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">3</span> 債務不履行と<span class="key-term" data-term="不法行為">不法行為</span></h2>
  <p>債務者が約束通りの行為をしない場合を「<strong>債務不履行</strong>」といいます。3つのパターンがあります。</p>

  <table class="styled-table">
    <thead><tr><th>種類</th><th>内容</th><th>海事での例</th></tr></thead>
    <tbody>
      <tr><td><strong>履行遅滞</strong></td><td>期限に遅れた</td><td>船舶の引渡日を過ぎても引き渡さない</td></tr>
      <tr><td><strong>履行不能</strong></td><td>履行が不可能になった</td><td>売買対象の船舶が沈没した</td></tr>
      <tr><td><strong>不完全履行</strong></td><td>履行はしたが不十分</td><td>修理を依頼したが不完全な修理だった</td></tr>
    </tbody>
  </table>
  <p>債務不履行の場合、債権者は<strong>損害賠償請求</strong>や<strong>契約解除</strong>ができます。</p>

  <h3>不法行為（民法第709条）</h3>
  <p><strong>「故意又は過失によって他人の権利又は法律上保護される利益を侵害した者は、これによって生じた損害を賠償する責任を負う」</strong></p>
  <p>船舶衝突による損害賠償はこの不法行為が根拠となります。<strong>立証責任は被害者側</strong>にあるのが原則です（加害者の故意・過失を被害者が証明する）。</p>
</div>

<div class="lesson-section">
  <h2><span class="section-num">4</span> <span class="key-term" data-term="時効">時効</span>と<span class="key-term" data-term="善意・悪意">善意・悪意</span></h2>

  <div class="two-col">
    <div class="col-card">
      <h4>消滅時効の具体的期間</h4>
      <ul>
        <li><strong>一般の債権</strong>：権利行使できると知った時から<strong>5年</strong>、または権利行使できる時から<strong>10年</strong>（<strong>第166条</strong>）</li>
        <li><strong>不法行為の損害賠償請求権</strong>：損害及び加害者を知った時から<strong>3年</strong>、不法行為の時から<strong>20年</strong>（<strong>第724条</strong>）</li>
        <li><strong>船舶衝突</strong>の損害賠償請求権：<strong>2年</strong>（商法特則）</li>
        <li><strong>海難救助料</strong>の請求権：<strong>2年</strong>（商法特則）</li>
      </ul>
    </div>
    <div class="col-card">
      <h4>取得時効</h4>
      <ul>
        <li><strong>善意・無過失の占有</strong>：<strong>10年</strong>（<strong>第162条第2項</strong>）</li>
        <li><strong>その他の占有</strong>：<strong>20年</strong>（<strong>第162条第1項</strong>）</li>
      </ul>
      <h4 style="margin-top:12px;">善意・悪意</h4>
      <ul>
        <li><strong>善意</strong> = ある事実を<strong>知らない</strong>こと</li>
        <li><strong>悪意</strong> = ある事実を<strong>知っている</strong>こと</li>
        <li>道徳的な意味ではない！法律独自の用語</li>
      </ul>
    </div>
  </div>

  <div class="info-box mnemonic">
    <div class="box-title">覚え方：時効の数字</div>
    <p>「<strong>ゴ・トー・ニ・ニ</strong>」── 一般債権<strong>5</strong>年、取得時効<strong>10</strong>/20年、衝突・救助<strong>2</strong>年、不法行為<strong>3</strong>年</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">5</span> 関連レッスン</h2>

</div>

<div class="info-box trap">
  <div class="box-title">ひっかけポイント</div>
  <ul style="margin-left:16px;font-size:0.82rem;">
    <li><strong>船舶先取特権</strong>は<strong>抵当権に優先</strong>する（登記なしで成立）── 通常の「抵当権が強い」イメージとは逆</li>
    <li><strong>船舶は動産</strong>だが登記制度がある ── 不動産と混同しないこと</li>
    <li><strong>善意＝知らない、悪意＝知っている</strong> ── 日常用語の善悪とは無関係</li>
    <li>消滅時効の起算点：<strong>「知った時から」5年</strong>と<strong>「権利行使できる時から」10年</strong>の2つがある</li>
  </ul>
</div>

<div class="summary-box">
  <h3>まとめ</h3>
  <ul>
    <li>契約は「申込み」と「承諾」の合致で成立する（<strong>口頭でも有効</strong>）</li>
    <li>物権＝物に対する直接的・排他的な権利（<strong>絶対権</strong>）、債権＝人に対する請求権（<strong>相対権</strong>）</li>
    <li><strong>船舶先取特権</strong>（登記不要）は<strong>船舶抵当権</strong>（登記必要）に<strong>優先</strong>する</li>
    <li>船舶は動産だが例外的に登記制度があり、<strong>抵当権を設定できる</strong></li>
    <li>債務不履行には<strong>履行遅滞・履行不能・不完全履行</strong>の3種類がある</li>
    <li><strong>不法行為</strong>（第709条）は船舶衝突の損害賠償の根拠</li>
    <li>一般債権の消滅時効は<strong>5年</strong>（知った時から）/ <strong>10年</strong>（客観的起算点）</li>
  </ul>
</div>`,
  quiz:[

    {q:"船舶先取特権と船舶抵当権の優先順位について正しいものは？",options:["抵当権が先取特権に優先する","先取特権と抵当権は同順位","先取特権が抵当権に優先する","登記の先後で決まる"],answer:2,explanation:"船舶先取特権は登記なしに当然に成立し、船舶抵当権に優先します。船員の給料保護等のためです。"},

<div class="intro-box">
  <div class="scenario">嵐の中、貨物船が転覆の危険に直面。船長は船を守るため、甲板上のコンテナ10個を海に投棄する決断をしました。この損害は誰が負担するのでしょうか？── これが「<span class="key-term" data-term="共同海損">共同海損</span>」の考え方です。</div>
  <p>商法の中でも「<strong>海商</strong>」と呼ばれる部分は、海上取引特有のルールを定めています。何百年もの歴史を持つ海のルールを学びましょう。</p>

<div class="lesson-section">
  <h2><span class="section-num">1</span> 商法の基礎</h2>
  <p>商法は商人の取引に関する法律です。民法の「<strong>特別法</strong>」にあたり、<strong>民法よりも優先適用</strong>されます（<strong>特別法は一般法に優先する</strong>）。</p>

  <div class="def-list">
    <div class="def-item"><span class="def-label">商人</span><span>自己の名をもって商行為をすることを業とする者</span></div>
    <div class="def-item"><span class="def-label">商行為</span><span>投機売買、仲介、運送、保険など法定された行為</span></div>
    <div class="def-item"><span class="def-label">海商</span><span>商法第3編（<strong>第684条〜第851条</strong>）。海上運送・船舶に関する特別規定</span></div>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">2</span> <span class="key-term" data-term="共同海損">共同海損</span>（General Average）</h2>
  <p>海上の共同危険を回避するために行った犠牲・費用を、利害関係者全員で分担する制度です（<strong>商法第788条〜</strong>）。</p>

  <div class="flowchart">
    <div class="flow-step red"><strong>共同の危険</strong>発生（嵐、浸水など）</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step orange">船長が<strong>故意かつ合理的</strong>に犠牲を決断（積荷投棄、曳航費用など）</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step blue">犠牲により船舶・残りの積荷が助かる（<strong>奏功</strong>）</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step green">犠牲の費用を船主・荷主などが<strong>価値の割合</strong>に応じて分担</div>
  </div>

  <div class="info-box note">
    <div class="box-title">共同海損の3要件（必ず覚える！）</div>
    <p>1. 船舶と積荷に<strong>共同の危険</strong>が存在すること<br>
    2. その危険を回避するために<strong>故意かつ合理的</strong>に犠牲を行ったこと<br>
    3. その犠牲が<strong>奏功</strong>したこと（船舶や積荷の一部が助かったこと）</p>
  </div>

  <h3>共同海損の具体的な分担計算</h3>
  <p>分担額は、<strong>各利害関係者の財産の到達時の価値</strong>に応じて按分されます。</p>
  <div class="info-box tip">
    <div class="box-title">具体例</div>
    <p>船舶の価値1億円、A荷主の積荷5,000万円、B荷主の積荷5,000万円の場合。嵐を避けるためにB荷主の積荷（5,000万円相当）を投棄して全体が助かった場合：<br>
    <strong>船主の分担</strong>：5,000万 × (1億/2億) = <strong>2,500万円</strong><br>
    <strong>A荷主の分担</strong>：5,000万 × (5,000万/2億) = <strong>1,250万円</strong><br>
    <strong>B荷主の分担</strong>：5,000万 × (5,000万/2億) = <strong>1,250万円</strong>（但しB荷主は犠牲を出した側なのでこの分担は相殺される）</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">3</span> <span class="key-term" data-term="船舶衝突">船舶衝突</span>と<span class="key-term" data-term="海難救助">海難救助</span></h2>

  <div class="two-col">
    <div class="col-card">
      <h4>船舶衝突（商法第797条〜）</h4>
      <ul>
        <li>過失割合に応じて損害賠償</li>
        <li>双方に過失 → <strong>過失割合に応じ分担</strong></li>
        <li>一方のみ過失 → <strong>その船が全額賠償</strong></li>
        <li><strong>不可抗力</strong> → 各自負担（賠償責任なし）</li>
        <li>過失割合が不明 → <strong>均等に分担</strong></li>
        <li>損害賠償請求権は<strong>2年</strong>で時効消滅</li>
        <li><strong>人の死傷</strong>に関しては<strong>連帯責任</strong></li>
      </ul>
    </div>
    <div class="col-card">
      <h4>海難救助（商法第800条〜）</h4>
      <ul>
        <li>遭難船舶等を救助した者は<strong>報酬請求権</strong>を有する</li>
        <li><strong>不成功無報酬の原則</strong>（No Cure, No Pay）</li>
        <li>報酬額の算定要素：
          <ul>
            <li>救助の<strong>困難さ・危険度</strong></li>
            <li>救助された財産の<strong>価値</strong></li>
            <li>救助に要した<strong>時間と費用</strong></li>
            <li>救助者の<strong>技術・努力</strong></li>
          </ul>
        </li>
        <li>報酬は救助された財産の価値を<strong>超えてはならない</strong></li>
        <li>環境損害防止の場合は<strong>特別補償</strong>あり（No Cure, No Payの例外）</li>
        <li>請求権は<strong>2年</strong>で時効消滅</li>
      </ul>
    </div>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">4</span> 運送と<span class="key-term" data-term="船荷証券">船荷証券</span></h2>
  <p>海上運送では、運送人が荷送人に<ruby>船荷証券<rt>ふなにしょうけん</rt></ruby>（<strong>B/L: Bill of Lading</strong>）を発行します。</p>

  <div class="info-box tip">
    <div class="box-title">船荷証券の3つの機能</div>
    <p><strong>1. 受取証</strong>：運送人が貨物を受け取った証拠<br>
    <strong>2. 運送契約の証拠</strong>：運送条件を記載<br>
    <strong>3. 有価証券（権利証券）</strong>：B/Lを持つ人が貨物の引渡しを請求できる</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">5</span> <span class="key-term" data-term="定期傭船">定期傭船</span>と<span class="key-term" data-term="裸傭船">裸傭船</span>の違い</h2>
  <table class="styled-table">
    <thead><tr><th>項目</th><th>定期傭船（T/C）</th><th>裸傭船（B/B）</th></tr></thead>
    <tbody>
      <tr><td><strong>船員の手配</strong></td><td><strong>船主</strong>が配乗</td><td><strong>傭船者</strong>が自ら手配</td></tr>
      <tr><td><strong>運航指示</strong></td><td><strong>傭船者</strong>が指示</td><td><strong>傭船者</strong>が全権</td></tr>
      <tr><td><strong>船体維持管理</strong></td><td><strong>船主</strong>が負担</td><td><strong>傭船者</strong>が負担</td></tr>
      <tr><td><strong>燃料費</strong></td><td><strong>傭船者</strong>が負担</td><td><strong>傭船者</strong>が負担</td></tr>
      <tr><td><strong>保険</strong></td><td><strong>船主</strong>が船体保険</td><td><strong>傭船者</strong>が船体保険</td></tr>
      <tr><td><strong>条文</strong></td><td>商法<strong>第704条</strong></td><td>商法<strong>第707条</strong></td></tr>
    </tbody>
  </table>

// ---------- LESSON 5: 船舶法 ----------
{

  title:'船舶法',

  subtitle:'船の「戸籍」を学ぶ',
  objectives:['日本船舶の4要件を列挙できる','日本船舶の特権を説明できる','登記と登録の違い・各パターンの流れを説明できる','手数料の納付方法を区別できる','仮船舶国籍証書と20トン未満の特例を理解する'],
  content:`
<div class="intro-box">
  <div class="scenario">人に戸籍があるように、船にも「国籍」があります。日本の国旗（日の丸）を掲げて航行できる船は「日本船舶」だけ。では、どうすれば船は日本国籍を取得できるのでしょうか？</div>
  <p>船舶法は船舶の国籍を定める法律です。海事代理士の実務で<strong>最も重要な法律の一つ</strong>であり、口述試験の出題科目です。</p>
</div>

<div class="lesson-section">
  <h2><span class="section-num">1</span> 日本船舶の4要件（第1条）</h2>
  <p>以下のいずれかに該当する船舶が「<strong>日本船舶</strong>」となります：</p>
  <table class="styled-table">
    <thead><tr><th>号</th><th>要件</th></tr></thead>
    <tbody>
      <tr><td><strong>第1号</strong></td><td><strong>日本の官庁又は公署</strong>の所有に属する船舶</td></tr>
      <tr><td><strong>第2号</strong></td><td><strong>日本国民</strong>の所有に属する船舶</td></tr>
      <tr><td><strong>第3号</strong></td><td>日本の法令により設立した会社で<strong>代表者の全員</strong>及び<strong>業務執行役員の3分の2以上</strong>が日本国民であるもの</td></tr>
      <tr><td><strong>第4号</strong></td><td>前号以外の法人で日本の法令により設立され、<strong>代表者の全員</strong>が日本国民であるもの</td></tr>
    </tbody>
  </table>

  <div class="info-box tip">
    <div class="box-title">日本船舶の3つの特権</div>
    <p>1. <strong>日本国旗（日の丸）を掲げる権利</strong>（国旗掲揚権）<br>
    2. <strong>不開港場に寄港する権利</strong>（外国船舶には原則認められない）<br>
    3. <strong>日本の各港間で旅客・貨物を運送する権利</strong>（<strong>カボタージュ</strong>＝沿岸輸送の独占）</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">2</span> 登記と登録の流れ</h2>
  <p>原則として、<span style="color:var(--danger);font-weight:bold">登記（法務局）</span> → <span style="color:var(--info);font-weight:bold">登録（<span class="key-term" data-term="管海官庁">管海官庁</span>）</span> → <span class="key-term" data-term="船舶国籍証書">船舶国籍証書</span>の交付、の順番です。</p>

  <h3>パターン1：新規建造による取得</h3>
  <div class="flowchart">
    <div class="flow-step blue">1. <span class="key-term" data-term="船籍港">船籍港</span>を定める</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step blue">2. <strong>管海官庁</strong>に<span class="key-term" data-term="総トン数">総トン数</span>の<span class="key-term" data-term="測度">測度</span>を申請</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step red">3. <strong>登記所（法務局）</strong>に所有権の<strong>保存登記</strong>を申請</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step blue">4. <strong>管海官庁</strong>に船舶国籍証書の<strong>交付</strong>を申請（＝登録）</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step green">5. 船舶国籍証書の<strong>謄本を船内に備える</strong></div>
  </div>

  <h3>パターン2：譲渡による取得</h3>
  <div class="flowchart">
    <div class="flow-step red">1. <strong>登記所</strong>に<strong>所有権移転登記</strong>（＋船籍港変更登記）を申請</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step blue">2. <strong>管海官庁</strong>に<strong>変更登録</strong>を申請（船舶国籍証書の書換えも同時申請）</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step blue">3. 書換後、<strong>遅滞なく</strong>旧船舶国籍証書を返還</div>
  </div>

  <h3>パターン3：総トン数の変更（改測）</h3>
  <div class="flowchart">
    <div class="flow-step blue">1. <strong>管海官庁</strong>で<strong>改測</strong>（総トン数の再測定）← <strong>管海官庁からスタート！</strong></div>
    <div class="flow-arrow">&darr;</div>

<div class="lesson-section">

  <p>船員と船舶所有者の間で締結する労働契約を「<strong>雇入契約</strong>」と呼びます（<strong>第32条</strong>〜）。</p>

  <div class="flowchart">
    <div class="flow-step blue">船員と船舶所有者が雇入契約を<strong>締結</strong></div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step green"><strong>地方運輸局長</strong>に届出（届出先に注意！）</div>
    <div class="flow-arrow">&darr;</div>
    <div class="flow-step orange"><span class="key-term" data-term="船員手帳">船員手帳</span>に契約内容を<strong>記載</strong></div>
  </div>

  <div class="info-box note">
    <div class="box-title">届出が必要な場面</div>
    <p>1. 雇入契約の<strong>締結</strong>時<br>
    2. 雇入契約の<strong>終了</strong>時<br>
    3. 雇入契約の<strong>変更</strong>時<br>
    いずれも<strong>地方運輸局長</strong>への届出が必要です。</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">3</span> 雇入契約の解除事由（完全版）</h2>
  <table class="styled-table">
    <thead><tr><th>解除権者</th><th>解除事由</th></tr></thead>
    <tbody>
      <tr><td rowspan="3"><strong>船舶所有者から</strong></td><td>船員が<strong>職務に不適任</strong>であるとき</td></tr>
      <tr><td>船員が<strong>職務を怠った</strong>とき</td></tr>
      <tr><td>船員を<strong>懲戒処分</strong>に付すべきとき</td></tr>
      <tr><td><strong>船員から</strong></td><td>雇入契約により定められた<strong>労働条件と著しく相違する</strong>とき</td></tr>
      <tr><td rowspan="3"><strong>双方から</strong></td><td><strong>24時間以上</strong>の期間を定めて<strong>書面</strong>で解除の申入れをし、その期間が終了したとき</td></tr>
      <tr><td>船員が<strong>負傷又は疾病のため職務に堪えない</strong>とき</td></tr>
      <tr><td>船舶が<strong>沈没、滅失</strong>したとき</td></tr>
    </tbody>
  </table>

  <div class="info-box warning">
    <div class="box-title">航海中の制限</div>
    <p><strong>航海中</strong>は原則として雇入契約を解除できません。ただし、船員が負傷・疾病で職務に堪えないときは例外です。これは船の安全運航を確保するためです。</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">4</span> 船長の権限（7つ）</h2>
  <p>船長は「<strong>船の最高責任者</strong>」です。海の上では警察も裁判所もないため、船長に特別な権限が与えられています。</p>

  <table class="styled-table">
    <thead><tr><th>権限</th><th>内容</th><th>条文</th></tr></thead>
    <tbody>
      <tr><td><strong>1. 在船者指揮命令権</strong></td><td>船内の全ての人に対する指揮命令</td><td>第7条</td></tr>
      <tr><td><strong>2. 航海中処分権</strong></td><td>航海の安全のためにやむを得ない処分</td><td>第8条</td></tr>
      <tr><td><strong>3. 発航前検査権</strong></td><td>出航前に船舶の堪航能力を確認</td><td>第9条</td></tr>
      <tr><td><strong>4. 甲板上の指揮権</strong></td><td>甲板上の事務の指揮</td><td>第10条</td></tr>
      <tr><td><strong>5. 代理権</strong></td><td>船舶所有者に代わって航海に必要な行為をする権限</td><td>第13条</td></tr>
      <tr><td><strong>6. 懲戒権</strong></td><td>海員に対する上陸禁止・戒告</td><td>第23条</td></tr>
      <tr><td><strong>7. 海員名簿の備置き義務</strong></td><td>船内に海員名簿を備え付ける</td><td>第58条の2</td></tr>
    </tbody>
  </table>

  <div class="info-box mnemonic">
    <div class="box-title">覚え方</div>
    <p>「<strong>在・航・発・甲・代・懲・名</strong>」── ザイコウハツカンダイチョウメイ ── 在船者指揮、航海中処分、発航前検査、甲板上指揮、代理権、懲戒権、海員名簿</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">5</span> 懲戒と<span class="key-term" data-term="船員手帳">船員手帳</span></h2>
  <div class="two-col">
    <div class="col-card">
      <h4>懲戒の2種類</h4>
      <ul>
        <li><strong>上陸禁止</strong>：<strong>10日以内</strong>（第23条第1項第1号）</li>
        <li><strong>戒告</strong>：<strong>文書による注意</strong>（第23条第1項第2号）</li>
        <li>※ <strong>減給・降格は懲戒として認められない</strong></li>
        <li>※ 懲戒事由がなくなったときは直ちに<strong>上陸禁止を解除</strong></li>
      </ul>
    </div>
    <div class="col-card">
      <h4>船員手帳</h4>
      <ul>

        <li>記載事項：氏名、生年月日、本籍</li>
        <li>雇入契約の<strong>締結・変更・終了</strong>を記載</li>
        <li>船員は常に<strong>携帯義務</strong>あり</li>
        <li>有効期間は<strong>10年</strong></li>
      </ul>
    </div>
  </div>
</div>

      <tr><td><strong>中間検査</strong></td><td>定期検査と定期検査の間</td><td>約<strong>2.5年</strong>ごと</td></tr>
      <tr><td><strong>臨時検査</strong></td><td>改造・修理後、事故後など</td><td>必要時</td></tr>
      <tr><td><strong>臨時航行検査</strong></td><td>検査証書のない船舶が臨時に航行するとき</td><td>必要時</td></tr>
    </tbody>
  </table>

    <div class="box-title">覚え方</div>
    <p>「<strong>初・定・中・臨・臨航</strong>」の5つ。定期＝<strong>5年</strong>、中間＝その間（<strong>2.5年</strong>）、臨時と臨時航行は「イレギュラー時」。</p>
  </div>
</div>

<div class="lesson-section">

      <tr><td><strong>近海区域</strong></td><td>東経175度〜南緯11度等の範囲内</td><td>アジア近海まで航行可</td></tr>

  </table>

<div class="lesson-section">

  <p>定期検査に合格すると<strong>船舶検査証書</strong>が交付されます。有効期間は<strong>5年</strong>。この証書がないと船舶は航行できません。</p>

</div>

<div class="lesson-section">

    <p>満載喫水線は季節や航行海域によって異なります。<strong>冬の北大西洋</strong>は波が高いため、夏より厳しい（浅い）制限値となります。<strong>熱帯海域</strong>では海水密度が高いため、より多く積載できます。</p>
  </div>
</div>

<div class="info-box trap">
  <div class="box-title">ひっかけポイント</div>
  <ul style="margin-left:16px;font-size:0.82rem;">
    <li>検査は<strong>5種類</strong> ── 「臨時検査」と「臨時<strong>航行</strong>検査」は別物！</li>
    <li>定期検査の周期は<strong>5年</strong>、中間検査は<strong>2.5年</strong> ── 定期検査の「半分の時期」と覚える</li>

    <li>定期検査は<strong>5年</strong>ごと、中間検査は約<strong>2.5年</strong>ごと</li>

    <li>船舶検査証書の有効期間は<strong>5年</strong>。この証書なしでは航行不可</li>

// ---------- LESSON 16: 海洋汚染防止法 ----------
{
  id:16, phase:3,

  objectives:['規制の全体像を理解する','6段階の手続き区別ができる','届出の時期の違いを把握する','油記録簿とMARPOL条約の関係を知る'],
  content:`
<div class="intro-box">
  <div class="scenario">油タンカーが事故を起こせば、大量の油が海に流れ出し、海洋生態系に壊滅的な被害を与えます。この法律は海洋環境を守るための規制を定めています。タンカー会社にとって最も身近な法律の一つです。</div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">1</span> 規制の全体像と<span class="key-term" data-term="MARPOL条約">MARPOL条約</span></h2>
  <p>この法律は国際条約<strong>MARPOL条約</strong>（マルポール条約）を国内法化したものです。</p>
  <table class="styled-table">
    <thead><tr><th>MARPOL附属書</th><th>規制対象</th></tr></thead>
    <tbody>
      <tr><td><strong>附属書I</strong></td><td><strong>油</strong>による汚染防止</td></tr>
      <tr><td><strong>附属書II</strong></td><td><strong>有害液体物質</strong>による汚染防止</td></tr>
      <tr><td><strong>附属書III</strong></td><td><strong>容器入り有害物質</strong>の海上運送</td></tr>
      <tr><td><strong>附属書IV</strong></td><td>船舶からの<strong>汚水</strong>による汚染防止</td></tr>
      <tr><td><strong>附属書V</strong></td><td>船舶からの<strong>廃棄物</strong>による汚染防止</td></tr>
      <tr><td><strong>附属書VI</strong></td><td>船舶からの<strong>大気汚染</strong>防止</td></tr>
    </tbody>
  </table>

  <h3><span class="key-term" data-term="油記録簿">油記録簿</span></h3>
  <p>総トン数<strong>150トン以上</strong>のタンカー及び総トン数<strong>400トン以上</strong>のタンカー以外の船舶は、<strong>油記録簿</strong>を船内に備え置き、油の排出・処理に関する記録を行う義務があります。</p>
</div>

<div class="lesson-section">
  <h2><span class="section-num">2</span> 6段階の手続き区別</h2>
  <table class="styled-table">
    <thead><tr><th>手続き</th><th>具体例</th></tr></thead>
    <tbody>
      <tr><td><span class="badge permit">許可</span></td><td>海洋施設からの廃棄物の<strong>海洋投入処分</strong>、<strong>廃油処理事業</strong>の開始</td></tr>
      <tr><td><span class="badge authorization">承認</span></td><td>海洋汚染防止のための<strong>試験・研究・調査</strong></td></tr>
      <tr><td><span class="badge registration">登録</span></td><td><strong>原動機取扱手引書</strong>の作成</td></tr>
      <tr><td><span class="badge confirmation">確認</span></td><td>原動機からの<strong>窒素酸化物（NOx）</strong>の放出量確認</td></tr>
      <tr><td><span class="badge notification">届出</span></td><td>未査定液体物質の輸送、<strong>油濁処理規定</strong>の作成・変更等</td></tr>
      <tr><td><span class="badge report">通報</span></td><td>油等の排出時（<strong>直ちに</strong>）、海難発生時</td></tr>
    </tbody>
  </table>

  <div class="info-box mnemonic">
    <div class="box-title">覚え方：6段階</div>
    <p>「<strong>キョ・ショウ・トウ・カク・トド・ツウ</strong>」── 許可・承認・登録・確認・届出・通報。<strong>厳しい順</strong>に並んでいる。</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">3</span> 届出の時期の区別</h2>
  <table class="styled-table">
    <thead><tr><th>時期</th><th>意味</th><th>具体例</th></tr></thead>
    <tbody>
      <tr><td><strong>「あらかじめ」</strong></td><td>事前に</td><td>未査定液体物質の輸送、船舶間貨物油積替え</td></tr>
      <tr><td><strong>「遅滞なく」</strong></td><td>合理的期間内に</td><td>油濁処理規定の作成・変更</td></tr>
      <tr><td><strong>「直ちに」</strong></td><td>即座に（猶予なし）</td><td>油等の排出があったとき → <strong>通報</strong></td></tr>
    </tbody>
  </table>

  <div class="info-box warning">
    <div class="box-title">緊急度の順番</div>
    <p>「<strong>直ちに</strong>」＞「<strong>遅滞なく</strong>」＞「<strong>あらかじめ</strong>」<br>
    <strong>「直ちに」</strong>が最も緊急。法律用語としての強さの順番を覚えること。</p>
  </div>
</div>

<div class="info-box trap">
  <div class="box-title">ひっかけポイント</div>
  <ul style="margin-left:16px;font-size:0.82rem;">
    <li>油の排出時は「<strong>直ちに通報</strong>」── 「届出」ではなく「<strong>通報</strong>」</li>
    <li>6段階の手続きの<strong>順番</strong>（許可→承認→登録→確認→届出→通報）を正確に覚える</li>
    <li>「あらかじめ」と「遅滞なく」の使い分け ── 「未査定液体物質」は事前、「油濁処理規定」は事後</li>
  </ul>
</div>

<div class="summary-box">
  <h3>まとめ</h3>
  <ul>
    <li><strong>MARPOL条約</strong>の国内法。6つの附属書で油・有害物質・大気汚染等を規制</li>
    <li>手続きは<strong>許可・承認・登録・確認・届出・通報</strong>の6段階</li>
    <li>油の排出時は「<strong>直ちに</strong>」<strong>通報</strong>。最も緊急度が高い</li>
    <li><strong>油記録簿</strong>の備え置き義務あり（タンカー150トン以上、その他400トン以上）</li>
  </ul>
</div>`,
  quiz:[
    {q:"油等の排出があった場合に求められる行動は？",options:["あらかじめ届出","遅滞なく届出","直ちに通報","7日以内に報告"],answer:2,explanation:"油等の排出があった場合は「直ちに」通報しなければなりません。"},
    {q:"廃油処理事業の開始に必要な手続きは？",options:["届出","登録","許可","承認"],answer:2,explanation:"廃油処理事業の開始には「許可」が必要です。"},
    {q:"MARPOL条約の附属書の数は？",options:["3つ","4つ","6つ","8つ"],answer:2,explanation:"MARPOL条約は6つの附属書で構成されています。"}
  ]
},

<div class="lesson-section">
  <h2><span class="section-num">2</span> <span class="key-term" data-term="無害通航">無害通航</span></h2>
  <p>外国船舶は日本の領海を<strong>無害に通航する権利</strong>を有します。ただし以下の行為は「<strong>有害</strong>」とされ通航が認められません：</p>
  <ul style="margin-left:20px;font-size:0.85rem;">

    <li><strong>軍事機器の発着・搭載</strong></li>
    <li><strong>漁獲活動</strong></li>
    <li><strong>調査・測量活動</strong></li>
    <li><strong>通信妨害</strong></li>
    <li><strong>密輸・密入国</strong></li>
    <li><strong>故意・重大な汚染行為</strong></li>
  </ul>

  <div class="info-box note">

    <p>通航は<strong>継続的かつ迅速</strong>でなければなりません。正当な理由なく<strong>停泊・投錨</strong>することは通航とみなされません。ただし、荒天避難や遭難船の救助など<strong>やむを得ない事由</strong>がある場合は例外です。</p>

    <li>「<strong>領海等</strong>」= 領海 ＋ <strong>内水</strong> ── 接続水域は含まれない</li>
    <li><strong>漁獲活動</strong>は無害通航に該当しない ── 「通りながら魚を獲る」のはダメ</li>
  </ul>
</div>

<div class="summary-box">
  <h3>まとめ</h3>
  <ul>
    <li>領海＝基線から<strong>12海里</strong>（約22.2km）。日本の<strong>主権</strong>が及ぶ</li>
    <li>接続水域＝基線から<strong>24海里</strong>。密輸・密入国の取締り</li>
    <li>EEZ＝基線から<strong>200海里</strong>（約370.4km）。天然資源の権利</li>
    <li>「<strong>領海等</strong>」＝ 領海 ＋ 内水</li>
    <li>外国船舶は<strong>無害通航権</strong>を有するが、軍事演習・漁獲・情報収集等は禁止</li>
  </ul>
</div>`,
  quiz:[
    {q:"日本の領海の範囲は基線から何海里か？",options:["3海里","12海里","24海里","200海里"],answer:1,explanation:"領海は基線から12海里（約22.2km）です。200海里はEEZです。"},
    {q:"「領海等」に含まれるのは？",options:["領海と接続水域","領海と内水","領海とEEZ","領海のみ"],answer:1,explanation:"「領海等」は領海と内水を合わせたものです。"},
    {q:"外国船舶の無害通航で許されないのは？",options:["通常の航行","積荷の運搬","漁獲活動","領海の通過"],answer:2,explanation:"漁獲活動は「有害」な行為とされ、無害通航の範囲外です。"}
  ]
},

// ---------- LESSON 19: ISPS法 ----------
{
  id:19, phase:4,
  title:'国際船舶・港湾施設の保安確保法（ISPS法）',
  titleReading:'アイエスピーエスほう',
  subtitle:'テロ対策の国際基準',
  objectives:['ISPS法の制定背景を理解する','3つの保安レベルの具体的対応措置を説明できる','国際航海船舶の定義を知る'],
  content:`
<div class="intro-box">
  <div class="scenario">2001年9月11日のアメリカ同時多発テロ。この事件をきっかけに、国際海事機関（IMO）はSOLAS条約を改正し、船舶と港湾施設のテロ対策を義務化しました。その国内法がISPS法です。</div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">1</span> 3つの保安レベルと具体的対応措置</h2>
  <table class="styled-table">
    <thead><tr><th>レベル</th><th>名称</th><th>状況</th><th>具体的対応</th></tr></thead>
    <tbody>
      <tr><td><span class="badge authorization">レベル1</span></td><td><strong>通常</strong></td><td>最低限の保安措置を維持</td><td>乗船者の身元確認、手荷物検査、巡回</td></tr>
      <tr><td><span class="badge approval">レベル2</span></td><td><strong>高められた</strong></td><td>テロの脅威が高まった場合</td><td>追加巡回、船舶へのアクセス制限強化、港湾施設との保安協定</td></tr>
      <tr><td><span class="badge permit">レベル3</span></td><td><strong>特別</strong></td><td>テロの脅威が具体的・差し迫っている場合</td><td>海上保安庁との連携、全乗船者の再確認、必要に応じ航行停止</td></tr>
    </tbody>
  </table>
</div>

<div class="lesson-section">
  <h2><span class="section-num">2</span> 国際航海船舶の定義</h2>
  <p>ISPS法が適用される「国際航海船舶」とは：</p>
  <ul style="margin-left:20px;font-size:0.85rem;">
    <li>国際航海に従事する<strong>旅客船</strong>（総トン数不問）</li>
    <li>国際航海に従事する総トン数<strong>500トン以上</strong>の船舶</li>
  </ul>

  <h3>船舶保安計画</h3>
  <p>国際航海船舶は<strong>船舶保安計画</strong>を策定し、<strong>国土交通大臣の承認</strong>を受ける必要があります。計画には各保安レベルに応じた具体的な保安措置が記載されます。また、<strong>船舶保安管理者</strong>を選任する義務があります。</p>
</div>

<div class="info-box trap">
  <div class="box-title">ひっかけポイント</div>
  <ul style="margin-left:16px;font-size:0.82rem;">
    <li><strong>旅客船</strong>は総トン数<strong>不問</strong>でISPS法適用 ── 「500トン以上」は旅客船以外の船舶の条件</li>
    <li>保安レベルは「1→2→3」で<strong>高くなる</strong> ── 数字が大きいほど脅威が大きい</li>
    <li>船舶保安計画は「<strong>承認</strong>」── 「許可」ではない</li>
  </ul>
</div>

<div class="summary-box">
  <h3>まとめ</h3>
  <ul>
    <li>ISPS法は<strong>9.11後</strong>のテロ対策として制定された国際条約の国内法</li>
    <li>保安レベルは3段階：<strong>通常（1）</strong>・<strong>高められた（2）</strong>・<strong>特別（3）</strong></li>
    <li>対象：国際航海の<strong>旅客船</strong>＋<strong>500トン以上</strong>の船舶</li>
    <li><strong>船舶保安計画</strong>の策定と<strong>国土交通大臣の承認</strong>が必要</li>
  </ul>
</div>`,
  quiz:[
    {q:"ISPS法が制定されるきっかけとなった出来事は？",options:["タイタニック号沈没","エクソン・バルディーズ号油流出","アメリカ同時多発テロ（9.11）","スエズ運河封鎖"],answer:2,explanation:"2001年9月11日のアメリカ同時多発テロを契機に制定されました。"},
    {q:"ISPS法における保安レベル2の名称は？",options:["通常","高められた","特別","緊急"],answer:1,explanation:"レベル2は「高められた」保安レベルです。"},
    {q:"ISPS法が適用される国際航海船舶の要件（旅客船以外）は？",options:["総トン数100トン以上","総トン数300トン以上","総トン数500トン以上","総トン数1000トン以上"],answer:2,explanation:"国際航海に従事する総トン数500トン以上の船舶にISPS法が適用されます。"}
  ]
},

// ---------- LESSON 20: 港湾法・港湾運送事業法 ----------
{
  id:20, phase:4,
  title:'港湾法・港湾運送事業法',

  content:`
<div class="intro-box">
  <div class="scenario">船が港に着いたら、荷物を降ろさなければなりません。この「港での荷役作業」を行う事業が港湾運送事業です。港自体の管理は港湾法で定められています。</div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">1</span> 港湾法の基礎</h2>
  <div class="def-list">
    <div class="def-item"><span class="def-label">港湾管理者</span><span>港湾の管理を行う主体（<strong>地方公共団体</strong>が多い。港務局の場合もある）</span></div>
    <div class="def-item"><span class="def-label">港湾区域</span><span>港湾管理者が管理する<strong>水域</strong></span></div>
    <div class="def-item"><span class="def-label">臨港地区</span><span>港湾に隣接する<strong>陸域</strong>で、港湾の機能を確保するために定められた地区</span></div>
    <div class="def-item"><span class="def-label">重要港湾</span><span>国際海上輸送網等に重要な港湾。政令で指定（約100港）</span></div>
    <div class="def-item"><span class="def-label">特定重要港湾</span><span>重要港湾のうち特に重要なもの（<strong>国際拠点港湾</strong>等）</span></div>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">2</span> 港湾運送事業の7種類</h2>
  <table class="styled-table">
    <thead><tr><th>No.</th><th>事業の種類</th><th>内容</th></tr></thead>
    <tbody>
      <tr><td><strong>1</strong></td><td><strong>一般港湾運送</strong></td><td>荷主からの委託で港湾運送を<strong>一括して</strong>行う（元請け）</td></tr>
      <tr><td><strong>2</strong></td><td><strong>港湾荷役</strong></td><td>船への<strong>積込み</strong>・船からの<strong>取卸し</strong></td></tr>
      <tr><td><strong>3</strong></td><td><strong>はしけ運送</strong></td><td><strong>はしけ</strong>（平底の小型船）で港内を運送</td></tr>
      <tr><td><strong>4</strong></td><td><strong>いかだ運送</strong></td><td><strong>木材</strong>をいかだに組んで運送</td></tr>
      <tr><td><strong>5</strong></td><td><strong>検数</strong></td><td>貨物の<strong>個数</strong>の計算・受渡しの確認</td></tr>
      <tr><td><strong>6</strong></td><td><strong>鑑定</strong></td><td>貨物の<strong>品質・数量等</strong>の鑑定</td></tr>
      <tr><td><strong>7</strong></td><td><strong>検量</strong></td><td>貨物の<strong>容積・重量</strong>の計量</td></tr>
    </tbody>
  </table>

  <div class="info-box mnemonic">
    <div class="box-title">覚え方：7種類</div>
    <p>「<strong>イッパン・ニヤク・ハシケ・イカダ・ケンスウ・カンテイ・ケンリョウ</strong>」<br>
    前半4つは<strong>モノを動かす事業</strong>、後半3つは<strong>モノを調べる事業</strong>（検数・鑑定・検量）。</p>
  </div>
</div>

<div class="lesson-section">
  <h2><span class="section-num">3</span> 規制のポイント</h2>
  <div class="two-col">
    <div class="col-card" style="border-top:4px solid var(--permit-red)">
      <h4>事業開始 → <span class="badge permit">許可</span>制</h4>
      <p style="font-size:0.8rem;">港湾運送事業を行うには<strong>国土交通大臣の許可</strong>が必要です。港湾労働者の保護・安全のため、厳しい規制が適用されます。</p>
    </div>
    <div class="col-card" style="border-top:4px solid var(--notification-blue)">
      <h4>料金 → <span class="badge notification">届出</span>制</h4>
      <p style="font-size:0.8rem;">料金の制定・変更は<strong>届出</strong>で足ります。<strong>あらかじめ</strong>届出が必要です。</p>
    </div>
  </div>
</div>

<div class="info-box trap">

// ===================================================================
// APP STATE & LOGIC
// ===================================================================

let state = {
  currentLesson: null,
  completedLessons: [],
  bookmarks: [],
  darkMode: false,
  sidebarOpen: true,
  startTime: Date.now(),
  totalStudyMinutes: 0,
  quizAnswers: {},
};

function loadState() {
  try {
    const saved = localStorage.getItem('kaiji_textbook_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed, startTime: Date.now() };
    }
  } catch(e) { console.log('State load failed'); }
}

function saveState() {
  try {
    const elapsed = Math.floor((Date.now() - state.startTime) / 60000);
    state.totalStudyMinutes += elapsed;
    state.startTime = Date.now();
    localStorage.setItem('kaiji_textbook_state', JSON.stringify({
      completedLessons: state.completedLessons,
      bookmarks: state.bookmarks,
      darkMode: state.darkMode,
      totalStudyMinutes: state.totalStudyMinutes,
      quizAnswers: state.quizAnswers,
    }));
  } catch(e) { console.log('State save failed'); }
}

// ===== SIDEBAR =====
function getImportanceBadge(lessonId) {
  const imp = IMPORTANCE[lessonId];
  if (!imp) return '';
  const cls = imp.level === 'critical' ? 'critical' : imp.level === 'important' ? 'important' : 'basic';
  const label = imp.level === 'critical' ? '\uD83D\uDD34' : imp.level === 'important' ? '\uD83D\uDFE1' : '\uD83D\uDD35';
  return `<span class="importance-badge-sm ${cls}">${label}</span>`;
}

function getImportanceBadgeLarge(lessonId) {
  const imp = IMPORTANCE[lessonId];
  if (!imp) return '';
  const cls = imp.level === 'critical' ? 'critical' : imp.level === 'important' ? 'important' : 'basic';
  const emoji = imp.level === 'critical' ? '\uD83D\uDD34 最重要' : imp.level === 'important' ? '\uD83D\uDFE1 重要' : '\uD83D\uDD35 基礎';
  return `<span class="importance-badge ${cls}">${emoji}</span>`;
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  let html = '';
  PHASES.forEach(phase => {
    html += `<div class="phase-group">`;
    html += `<div class="phase-header expanded" onclick="togglePhase(this)">
      <span class="arrow">&#9654;</span> ${phase.title}
    </div>`;
    html += `<div class="phase-lessons">`;
    phase.lessons.forEach(lid => {
      const lesson = LESSONS.find(l => l.id === lid);
      const completed = state.completedLessons.includes(lid);
      const active = state.currentLesson === lid;
      const icon = completed ? '&#10003;' : '&#9675;';
      const cls = (completed ? ' completed' : '') + (active ? ' active' : '');
      const badge = getImportanceBadge(lid);
      html += `<div class="lesson-item${cls}" data-lesson="${lid}" onclick="openLesson(${lid})">
        <span class="status-icon">${icon}</span>
        <span style="flex:1">L${lid}: ${lesson.title}</span>
        ${badge}
      </div>`;
    });
    html += `</div></div>`;
  });
  nav.innerHTML = html;
}

function togglePhase(el) { el.classList.toggle('expanded'); }

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  state.sidebarOpen = !sb.classList.contains('collapsed');
  document.getElementById('main').style.marginLeft = state.sidebarOpen ? '300px' : '0';
  document.getElementById('topbar').style.left = state.sidebarOpen ? '300px' : '0';
}

function updateProgress() {
  const pct = Math.round((state.completedLessons.length / LESSONS.length) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('completed-count').textContent = state.completedLessons.length + '/' + LESSONS.length + ' 完了';
  const mins = state.totalStudyMinutes + Math.floor((Date.now() - state.startTime) / 60000);
  document.getElementById('study-time').textContent = '学習時間: ' + mins + '分';
}

function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  document.documentElement.setAttribute('data-theme', state.darkMode ? 'dark' : 'light');
  document.getElementById('dark-toggle').textContent = state.darkMode ? '\u2600' : '\u263D';
  saveState();
}

// ===== TERM POPUP =====
function showTermPopup(termKey) {
  const term = TERMS[termKey];
  if (!term) return;
  document.getElementById('term-title').textContent = termKey;
  document.getElementById('term-reading').textContent = term.reading;
  document.getElementById('term-definition').textContent = term.definition;
  document.getElementById('term-example').textContent = term.example;
  document.getElementById('term-article').textContent = term.article;
  const btn = document.getElementById('term-bookmark-btn');
  const isBookmarked = state.bookmarks.includes(termKey);
  btn.classList.toggle('bookmarked', isBookmarked);
  btn.innerHTML = (isBookmarked ? '&#9733;' : '&#9734;') + ' ブックマーク';
  btn.setAttribute('data-term', termKey);
  document.getElementById('term-overlay').classList.add('show');
  document.getElementById('term-popup').classList.add('show');
}

function closeTermPopup() {
  document.getElementById('term-overlay').classList.remove('show');
  document.getElementById('term-popup').classList.remove('show');
}

function toggleBookmark() {
  const btn = document.getElementById('term-bookmark-btn');
  const termKey = btn.getAttribute('data-term');
  const idx = state.bookmarks.indexOf(termKey);
  if (idx >= 0) { state.bookmarks.splice(idx, 1); btn.classList.remove('bookmarked'); btn.innerHTML = '&#9734; ブックマーク'; }
  else { state.bookmarks.push(termKey); btn.classList.add('bookmarked'); btn.innerHTML = '&#9733; ブックマーク'; }
  saveState(); renderBookmarks();
}

function toggleBookmarks() { document.getElementById('bookmarks-panel').classList.toggle('show'); renderBookmarks(); }

function renderBookmarks() {
  const list = document.getElementById('bookmarks-list');
  if (state.bookmarks.length === 0) {
    list.innerHTML = '<p style="font-size:0.8rem;color:var(--text-light);">ブックマークした用語はまだありません。</p>';
    return;
  }
  list.innerHTML = state.bookmarks.map(key => {
    const t = TERMS[key];
    return `<div class="bookmark-item" onclick="showTermPopup('${key}')"><div class="term">${key}</div><div class="reading">${t ? t.reading : ''}</div></div>`;
  }).join('');
}

function searchTerms(query) {
  const results = document.getElementById('search-results');
  if (!query || query.length < 1) { results.innerHTML = ''; return; }
  const matches = Object.keys(TERMS).filter(k => k.includes(query) || TERMS[k].reading.includes(query) || TERMS[k].definition.includes(query));
  results.innerHTML = matches.slice(0, 8).map(k => `<div class="search-result-item" onclick="showTermPopup('${k}')">${k}（${TERMS[k].reading}）</div>`).join('');
}

// ===== LESSON RENDERING =====
function openLesson(id) {
  const lesson = LESSONS.find(l => l.id === id);
  if (!lesson) return;
  state.currentLesson = id;
  state.quizAnswers[id] = state.quizAnswers[id] || {};
  buildSidebar(); updateProgress();
  document.getElementById('current-lesson-title').textContent = `Lesson ${id}: ${lesson.title}`;

  const prevLesson = id > 1 ? LESSONS.find(l => l.id === id - 1) : null;
  const nextLesson = id < LESSONS.length ? LESSONS.find(l => l.id === id + 1) : null;
  const quizCount = lesson.quiz ? lesson.quiz.length : 0;
  const passCount = Math.max(2, Math.ceil(quizCount * 0.6));

  let html = `<div class="lesson-container">`;
  html += `<div class="lesson-progress-bar"><div class="lesson-progress-track"><div class="lesson-progress-fill" id="lesson-progress"></div></div></div>`;
  html += `<div class="lesson-header">
    <span class="lesson-phase-tag">Phase ${lesson.phase}</span>
    ${getImportanceBadgeLarge(id)}
    <h1><ruby>${lesson.title}<rt>${lesson.titleReading}</rt></ruby></h1>
    <p style="color:var(--text-light);font-size:0.85rem;">${lesson.subtitle}</p>
    <div class="learning-objectives">
      <h3>この講義の学習目標</h3>
      <ul>${lesson.objectives.map(o => `<li>${o}</li>`).join('')}</ul>
    </div>
  </div>`;

  html += lesson.content;

  if (lesson.quiz && lesson.quiz.length > 0) {
    html += `<div class="quiz-section">
      <h3>理解度チェック</h3>
      <p class="quiz-subtitle">${quizCount}問中${passCount}問正解でこのレッスンを完了できます。</p>`;
    lesson.quiz.forEach((q, i) => {
      html += `<div class="quiz-question" id="quiz-q${i}">
        <p>Q${i+1}. ${q.q}</p>
        <div class="quiz-options">`;
      q.options.forEach((opt, j) => {
        html += `<div class="quiz-option" data-q="${i}" data-opt="${j}" onclick="selectQuizOption(${id},${i},${j})">${opt}</div>`;
      });
      html += `</div><div class="quiz-explanation" id="quiz-exp${i}">${q.explanation}</div></div>`;
    });
    html += `<div style="text-align:center;">
      <button class="quiz-submit-btn" id="quiz-submit" onclick="submitQuiz(${id})">回答を確認する</button>
    </div>
    <div class="quiz-result" id="quiz-result"></div></div>`;
  }

  html += `<div class="lesson-nav">`;
  if (prevLesson) {
    html += `<button class="lesson-nav-btn prev" onclick="openLesson(${prevLesson.id})"><span class="label">&larr; 前のレッスン</span>Lesson ${prevLesson.id}: ${prevLesson.title}</button>`;
  } else {
    html += `<button class="lesson-nav-btn prev" onclick="showWelcome()"><span class="label">&larr; 戻る</span>ホーム</button>`;
  }
  if (nextLesson) {
    html += `<button class="lesson-nav-btn next" onclick="openLesson(${nextLesson.id})"><span class="label">次のレッスン &rarr;</span>Lesson ${nextLesson.id}: ${nextLesson.title}</button>`;
  }
  html += `</div></div>`;

  document.getElementById('content').innerHTML = html;
  window.scrollTo(0, 0);

  setTimeout(() => {
    document.querySelectorAll('.key-term').forEach(el => {
      el.addEventListener('click', () => showTermPopup(el.getAttribute('data-term')));
    });
    document.querySelectorAll('.expand-card-header').forEach(el => {
      el.addEventListener('click', () => el.parentElement.classList.toggle('open'));
    });
    const saved = state.quizAnswers[id] || {};
    Object.keys(saved).forEach(qi => {
      const opt = saved[qi];
      const el = document.querySelector(`.quiz-option[data-q="${qi}"][data-opt="${opt}"]`);
      if (el) el.classList.add('selected');
    });
    trackLessonProgress();
  }, 100);

  saveState();
}

function selectQuizOption(lessonId, qIdx, optIdx) {
  document.querySelectorAll(`.quiz-option[data-q="${qIdx}"]`).forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.quiz-option[data-q="${qIdx}"][data-opt="${optIdx}"]`);
  if (el) el.classList.add('selected');
  if (!state.quizAnswers[lessonId]) state.quizAnswers[lessonId] = {};
  state.quizAnswers[lessonId][qIdx] = optIdx;
  saveState();
}

function submitQuiz(lessonId) {
  const lesson = LESSONS.find(l => l.id === lessonId);
  if (!lesson || !lesson.quiz) return;
  const answers = state.quizAnswers[lessonId] || {};
  let correct = 0;
  const quizCount = lesson.quiz.length;
  const passCount = Math.max(2, Math.ceil(quizCount * 0.6));

  lesson.quiz.forEach((q, i) => {
    const selected = answers[i];
    const options = document.querySelectorAll(`.quiz-option[data-q="${i}"]`);
    options.forEach(opt => {
      opt.style.pointerEvents = 'none';
      const optIdx = parseInt(opt.getAttribute('data-opt'));
      if (optIdx === q.answer) opt.classList.add('correct');
      if (optIdx === selected && optIdx !== q.answer) opt.classList.add('incorrect');
    });
    if (selected === q.answer) correct++;
    document.getElementById('quiz-exp' + i).classList.add('show');
  });

  const result = document.getElementById('quiz-result');
  const passed = correct >= passCount;
  result.className = 'quiz-result show ' + (passed ? 'pass' : 'fail');
  result.innerHTML = passed
    ? `<h3 style="color:var(--success);">${correct}/${quizCount} 正解！レッスン完了！</h3><p>よくできました。次のレッスンに進みましょう。</p>`
    : `<h3 style="color:var(--danger);">${correct}/${quizCount} 正解</h3><p>${passCount}問以上の正解が必要です。内容を復習してもう一度挑戦しましょう。<br><button class="quiz-submit-btn" onclick="retryQuiz(${lessonId})" style="margin-top:10px;">もう一度挑戦</button></p>`;

  document.getElementById('quiz-submit').style.display = 'none';

  if (passed && !state.completedLessons.includes(lessonId)) {
    state.completedLessons.push(lessonId);
    buildSidebar(); updateProgress(); saveState();
  }
}

function retryQuiz(lessonId) {
  state.quizAnswers[lessonId] = {};
  saveState(); openLesson(lessonId);
  setTimeout(() => {
    const quizEl = document.querySelector('.quiz-section');
    if (quizEl) quizEl.scrollIntoView({ behavior:'smooth' });
  }, 200);
}

function trackLessonProgress() {
  const progressBar = document.getElementById('lesson-progress');
  if (!progressBar) return;
  const update = () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? Math.min(100, Math.round((scrollTop / docHeight) * 100)) : 100;
    progressBar.style.width = pct + '%';
  };
  window.addEventListener('scroll', update);
  update();
}

// ===== WELCOME SCREEN =====
function showWelcome() {
  state.currentLesson = null;
  document.getElementById('current-lesson-title').textContent = 'ホーム';
  buildSidebar(); updateProgress();

  const nextLesson = LESSONS.find(l => !state.completedLessons.includes(l.id)) || LESSONS[0];

  document.getElementById('content').innerHTML = `
    <div class="welcome-screen fade-in">
      <h1>海事代理士試験<br>インタラクティブテキスト</h1>
      <p class="lead">ゼロから学ぶ海事法規の世界。全20レッスンで合格力を身につけましょう。</p>

      <div class="badge-legend">
        <h3>重要度バッジの見方</h3>
        <div class="badge-legend-items">
          <div class="badge-legend-item"><span class="importance-badge critical">\uD83D\uDD34 最重要</span>口述試験科目・最高配点（船員法、船舶安全法、船舶法、海上交通安全法、港則法）</div>
          <div class="badge-legend-item"><span class="importance-badge important">\uD83D\uDFE1 重要</span>筆記試験高配点（海上運送法、内航海運業法、海洋汚染防止法、船舶職員法、商法）</div>
          <div class="badge-legend-item"><span class="importance-badge basic">\uD83D\uDD35 基礎</span>基礎科目（憲法、民法、国土交通省設置法、その他）</div>
        </div>
      </div>

      <div class="welcome-cards">
        <div class="welcome-card recommended" onclick="openLesson(${nextLesson.id})">
          <div class="emoji">&#128218;</div>
          <h3>次のレッスン</h3>
          <p>Lesson ${nextLesson.id}: ${nextLesson.title}</p>
        </div>
        <div class="welcome-card" onclick="openLesson(1)">
          <div class="emoji">&#127793;</div>
          <h3>最初から</h3>
          <p>Phase 1: 法律の基礎固め</p>
        </div>
        <div class="welcome-card" onclick="toggleBookmarks()">
          <div class="emoji">&#9734;</div>
          <h3>ブックマーク</h3>
          <p>${state.bookmarks.length}個の用語を保存中</p>
        </div>
        <div class="welcome-card" onclick="showAllTerms()">
          <div class="emoji">&#128209;</div>
          <h3>用語辞典</h3>
          <p>${Object.keys(TERMS).length}個の重要用語</p>
        </div>
      </div>

      <div style="margin-top:30px;">
        <button class="start-btn" onclick="openLesson(${nextLesson.id})">学習を始める &rarr;</button>
      </div>

      <div style="margin-top:40px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto;">
        <h3 style="font-family:var(--font-heading);font-size:1rem;margin-bottom:12px;">カリキュラム全体像</h3>
        ${PHASES.map(phase => `
          <div style="margin-bottom:16px;">
            <h4 style="font-family:var(--font-heading);font-size:0.85rem;color:var(--accent);margin-bottom:6px;">${phase.title}</h4>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${phase.lessons.map(lid => {
                const l = LESSONS.find(x => x.id === lid);
                const done = state.completedLessons.includes(lid);
                const imp = IMPORTANCE[lid];
                const borderColor = imp && imp.level === 'critical' ? '#e74c3c' : imp && imp.level === 'important' ? '#f39c12' : 'var(--border)';
                return `<span style="font-size:0.7rem;padding:4px 10px;border-radius:12px;border:1px solid ${done ? 'var(--success)' : borderColor};background:${done ? 'rgba(39,174,96,0.1)' : 'transparent'};cursor:pointer;" onclick="openLesson(${lid})">${done ? '&#10003; ' : ''}${l.title}</span>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  window.scrollTo(0, 0);
}

function showAllTerms() {
  state.currentLesson = null;
  document.getElementById('current-lesson-title').textContent = '用語辞典';
  let html = `<div class="lesson-container fade-in"><div class="lesson-header"><h1>重要用語辞典</h1><p style="color:var(--text-light);font-size:0.85rem;">${Object.keys(TERMS).length}個の重要用語を収録</p></div>`;
  Object.keys(TERMS).sort().forEach(key => {
    const t = TERMS[key];
    html += `<div class="expand-card"><div class="expand-card-header" onclick="this.parentElement.classList.toggle('open')"><span>${key}（${t.reading}）</span><span class="icon">&#9660;</span></div><div class="expand-card-body"><p><strong>定義：</strong>${t.definition}</p><p><strong>具体例：</strong>${t.example}</p><p><strong>関連条文：</strong>${t.article}</p></div></div>`;
  });
  html += `<div style="margin-top:20px;text-align:center;"><button class="lesson-nav-btn" onclick="showWelcome()" style="max-width:200px;margin:0 auto;">&larr; ホームに戻る</button></div></div>`;
  document.getElementById('content').innerHTML = html;
  window.scrollTo(0, 0);
}

// ===== INIT =====
function init() {
  loadState();
  if (state.darkMode) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('dark-toggle').textContent = '\u2600';
  }
  buildSidebar(); updateProgress(); showWelcome();
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('collapsed');
    state.sidebarOpen = false;
    document.getElementById('main').style.marginLeft = '0';
    document.getElementById('topbar').style.left = '0';
  }
  setInterval(() => { updateProgress(); saveState(); }, 60000);
}

init();
</script>
